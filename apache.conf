# =============================================================================
# XenonOS Laravel API - Apache Production Configuration
# =============================================================================
# Place this file at: /etc/apache2/sites-available/xenonos-api.conf
# Enable with: a2ensite xenonos-api
# =============================================================================

<VirtualHost *:80>
    ServerName api.xenonos.com
    ServerAlias api.yourdomain.com
    ServerAdmin admin@yourdomain.com
    
    # Redirect all HTTP traffic to HTTPS
    Redirect permanent / https://api.yourdomain.com/
</VirtualHost>

<VirtualHost *:443>
    ServerName api.xenonos.com
    ServerAlias api.yourdomain.com
    ServerAdmin admin@yourdomain.com
    
    # Document root
    DocumentRoot /var/www/xenonos-api/public
    
    # =============================================================================
    # SSL CONFIGURATION
    # =============================================================================
    
    SSLEngine on
    SSLCertificateFile /etc/letsencrypt/live/api.yourdomain.com/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/api.yourdomain.com/privkey.pem
    SSLCertificateChainFile /etc/letsencrypt/live/api.yourdomain.com/chain.pem
    
    # SSL protocols and ciphers
    SSLProtocol all -SSLv3 -TLSv1 -TLSv1.1 +TLSv1.2 +TLSv1.3
    SSLCipherSuite ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384
    SSLHonorCipherOrder on
    SSLCompression off
    SSLSessionTickets off
    
    # OCSP Stapling
    SSLUseStapling on
    SSLStaplingResponderTimeout 5
    SSLStaplingReturnResponderErrors off
    
    # =============================================================================
    # DIRECTORY CONFIGURATION
    # =============================================================================
    
    <Directory /var/www/xenonos-api/public>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
        
        # Enable mod_rewrite for Laravel routing
        RewriteEngine On
        
        # Security headers
        Header always set X-Frame-Options "SAMEORIGIN"
        Header always set X-Content-Type-Options "nosniff"
        Header always set X-XSS-Protection "1; mode=block"
        Header always set Referrer-Policy "strict-origin-when-cross-origin"
        Header always set Strict-Transport-Security "max-age=31536000; includeSubDomains"
        
        # Hide PHP version
        <IfModule mod_php.c>
            php_flag expose_php Off
        </IfModule>
    </Directory>
    
    # =============================================================================
    # DENY ACCESS TO SENSITIVE FILES
    # =============================================================================
    
    # Deny access to .env and other sensitive files
    <FilesMatch "^\.env">
        Require all denied
    </FilesMatch>
    
    <FilesMatch "\.(git|svn|idea|vscode)">
        Require all denied
    </FilesMatch>
    
    <FilesMatch "(composer|package)\.(json|lock)$">
        Require all denied
    </FilesMatch>
    
    <FilesMatch "phpunit\.xml$">
        Require all denied
    </FilesMatch>
    
    # Deny access to hidden files
    <FilesMatch "^\..*">
        Require all denied
    </FilesMatch>
    
    # Deny access to storage directory (except app/public)
    <DirectoryMatch "/var/www/xenonos-api/storage/(?!app/public)">
        Require all denied
    </DirectoryMatch>
    
    # Deny access to vendor directory
    <DirectoryMatch "/var/www/xenonos-api/vendor">
        Require all denied
    </DirectoryMatch>
    
    # Deny access to bootstrap/cache
    <DirectoryMatch "/var/www/xenonos-api/bootstrap/cache">
        Require all denied
    </DirectoryMatch>
    
    # Deny access to database directory
    <DirectoryMatch "/var/www/xenonos-api/database">
        Require all denied
    </DirectoryMatch>
    
    # =============================================================================
    # PHP-FPM CONFIGURATION
    # =============================================================================
    
    <FilesMatch \.php$>
        SetHandler "proxy:unix:/run/php/php8.3-fpm.sock|fcgi://localhost"
    </FilesMatch>
    
    # =============================================================================
    # COMPRESSION
    # =============================================================================
    
    <IfModule mod_deflate.c>
        # Compress text, HTML, JavaScript, CSS, and XML
        AddOutputFilterByType DEFLATE text/html
        AddOutputFilterByType DEFLATE text/css
        AddOutputFilterByType DEFLATE text/javascript
        AddOutputFilterByType DEFLATE text/xml
        AddOutputFilterByType DEFLATE text/plain
        AddOutputFilterByType DEFLATE application/javascript
        AddOutputFilterByType DEFLATE application/json
        AddOutputFilterByType DEFLATE application/xml
        AddOutputFilterByType DEFLATE application/xhtml+xml
        AddOutputFilterByType DEFLATE image/svg+xml
        
        # Don't compress images and already compressed files
        SetEnvIfNoCase Request_URI \.(?:gif|jpe?g|png|ico|webp|zip|gz|bz2|rar)$ no-gzip dont-vary
    </IfModule>
    
    # =============================================================================
    # BROWSER CACHING
    # =============================================================================
    
    <IfModule mod_expires.c>
        ExpiresActive On
        
        # Images
        ExpiresByType image/jpeg "access plus 1 year"
        ExpiresByType image/png "access plus 1 year"
        ExpiresByType image/gif "access plus 1 year"
        ExpiresByType image/webp "access plus 1 year"
        ExpiresByType image/svg+xml "access plus 1 year"
        ExpiresByType image/x-icon "access plus 1 year"
        
        # CSS and JavaScript
        ExpiresByType text/css "access plus 1 year"
        ExpiresByType application/javascript "access plus 1 year"
        ExpiresByType text/javascript "access plus 1 year"
        
        # Fonts
        ExpiresByType font/woff2 "access plus 1 year"
        ExpiresByType font/woff "access plus 1 year"
        ExpiresByType font/ttf "access plus 1 year"
        ExpiresByType font/otf "access plus 1 year"
        
        # HTML
        ExpiresByType text/html "access plus 0 seconds"
    </IfModule>
    
    <IfModule mod_headers.c>
        # Cache static assets
        <FilesMatch "\.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp)$">
            Header set Cache-Control "max-age=31536000, public, immutable"
        </FilesMatch>
        
        # Don't cache HTML
        <FilesMatch "\.(html|php)$">
            Header set Cache-Control "max-age=0, no-cache, no-store, must-revalidate"
        </FilesMatch>
    </IfModule>
    
    # =============================================================================
    # CORS CONFIGURATION
    # =============================================================================
    
    <IfModule mod_headers.c>
        # Allow CORS from your frontend domain
        Header set Access-Control-Allow-Origin "https://app.yourdomain.com"
        Header set Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS"
        Header set Access-Control-Allow-Headers "Authorization, Content-Type, Accept, Origin, X-Requested-With"
        Header set Access-Control-Allow-Credentials "true"
        Header set Access-Control-Max-Age "86400"
        
        # Handle preflight requests
        RewriteEngine On
        RewriteCond %{REQUEST_METHOD} OPTIONS
        RewriteRule ^(.*)$ $1 [R=200,L]
    </IfModule>
    
    # =============================================================================
    # LOGGING
    # =============================================================================
    
    ErrorLog ${APACHE_LOG_DIR}/xenonos-api-error.log
    CustomLog ${APACHE_LOG_DIR}/xenonos-api-access.log combined
    
    # =============================================================================
    # SECURITY HARDENING
    # =============================================================================
    
    # Hide server version
    ServerTokens Prod
    ServerSignature Off
    
    # Limit request size (prevent DoS)
    LimitRequestBody 10485760
    
    # Timeout settings
    Timeout 60
    KeepAlive On
    MaxKeepAliveRequests 100
    KeepAliveTimeout 5
</VirtualHost>

# =============================================================================
# ADDITIONAL CONFIGURATION NOTES
# =============================================================================

# Required Apache modules:
# a2enmod ssl
# a2enmod rewrite
# a2enmod headers
# a2enmod deflate
# a2enmod expires
# a2enmod proxy
# a2enmod proxy_fcgi
# a2enmod ssl

# Enable site:
# a2ensite xenonos-api
# a2dissite 000-default

# Test configuration:
# apachectl configtest

# Reload Apache:
# systemctl reload apache2
