# =============================================================================
# XenonOS Laravel API - Nginx Production Configuration
# =============================================================================
# Place this file at: /etc/nginx/sites-available/xenonos-api
# Enable with: ln -s /etc/nginx/sites-available/xenonos-api /etc/nginx/sites-enabled/
# =============================================================================

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=60r/m;
limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

# Upstream for PHP-FPM
upstream php-fpm {
    server unix:/run/php/php8.3-fpm.sock;
    keepalive 32;
}

# HTTP Server - Redirect to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name api.xenonos.com api.yourdomain.com;

    # Redirect all HTTP traffic to HTTPS
    return 301 https://$server_name$request_uri;
}

# HTTPS Server
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.xenonos.com api.yourdomain.com;

    # Document root
    root /var/www/xenonos-api/public;
    index index.php;

    # =============================================================================
    # SSL CONFIGURATION
    # =============================================================================
    
    # Certificate paths (update with your actual paths)
    ssl_certificate /etc/letsencrypt/live/api.yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.yourdomain.com/privkey.pem;
    
    # SSL protocols and ciphers
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384';
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_session_tickets off;
    
    # OCSP Stapling
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout 5s;

    # =============================================================================
    # SECURITY HEADERS
    # =============================================================================
    
    # Basic security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    
    # HSTS (HTTP Strict Transport Security)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    
    # Content Security Policy (adjust as needed)
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' https:; frame-ancestors 'self';" always;
    
    # Permissions Policy
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=(), usb=()" always;
    
    # Hide Nginx version
    server_tokens off;

    # =============================================================================
    # LOGGING
    # =============================================================================
    
    access_log /var/log/nginx/xenonos-api-access.log;
    error_log /var/log/nginx/xenonos-api-error.log;

    # =============================================================================
    # COMPRESSION
    # =============================================================================
    
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript 
               application/x-javascript application/xml application/javascript 
               application/json application/xml+rss;
    
    # Brotli compression (if module is installed)
    # brotli on;
    # brotli_comp_level 6;
    # brotli_types text/plain text/css text/xml text/javascript 
    #              application/x-javascript application/xml application/javascript 
    #              application/json;

    # =============================================================================
    # MAIN LOCATION
    # =============================================================================
    
    location / {
        # Rate limiting
        limit_req zone=api_limit burst=20 nodelay;
        limit_conn conn_limit 10;
        
        # Try files for Laravel routing
        try_files $uri $uri/ /index.php?$query_string;
    }

    # =============================================================================
    # PHP-FPM CONFIGURATION
    # =============================================================================
    
    location ~ \.php$ {
        # Rate limiting
        limit_req zone=api_limit burst=10 nodelay;
        
        # FastCGI configuration
        fastcgi_pass php-fpm;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        
        # Hide PHP version
        fastcgi_hide_header X-Powered-By;
        
        # Timeouts
        fastcgi_connect_timeout 60s;
        fastcgi_send_timeout 60s;
        fastcgi_read_timeout 60s;
        
        # Buffer sizes
        fastcgi_buffer_size 128k;
        fastcgi_buffers 4 256k;
        fastcgi_busy_buffers_size 256k;
        
        # Additional FastCGI parameters
        fastcgi_param HTTPS on;
        fastcgi_param HTTP_PROXY "";
    }

    # =============================================================================
    # ASSET CACHING
    # =============================================================================
    
    # Static assets with long cache
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|otf|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }
    
    # Laravel Mix/Vite build assets
    location ~* ^/build/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # =============================================================================
    # API ENDPOINTS
    # =============================================================================
    
    # API rate limiting (more restrictive)
    location /api/ {
        limit_req zone=api_limit burst=30 nodelay;
        limit_conn conn_limit 20;
        
        # CORS headers (adjust for your frontend domain)
        add_header Access-Control-Allow-Origin "https://app.yourdomain.com" always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type, Accept, Origin, X-Requested-With" always;
        add_header Access-Control-Allow-Credentials "true" always;
        add_header Access-Control-Max-Age 86400 always;
        
        # Handle preflight requests
        if ($request_method = 'OPTIONS') {
            add_header Access-Control-Allow-Origin "https://app.yourdomain.com" always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Authorization, Content-Type, Accept, Origin, X-Requested-With" always;
            add_header Access-Control-Allow-Credentials "true" always;
            add_header Access-Control-Max-Age 86400 always;
            add_header Content-Type 'text/plain; charset=utf-8';
            add_header Content-Length 0;
            return 204;
        }
        
        try_files $uri $uri/ /index.php?$query_string;
    }

    # =============================================================================
    # WEBSOCKET/REVERB (if using)
    # =============================================================================
    
    # Laravel Reverb WebSocket endpoint
    location /laravel-reverb {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }

    # =============================================================================
    # HEALTH CHECK
    # =============================================================================
    
    location /health {
        access_log off;
        try_files $uri $uri/ /index.php?$query_string;
    }

    # =============================================================================
    # SECURITY RESTRICTIONS
    # =============================================================================
    
    # Deny access to hidden files
    location ~ /\. {
        deny all;
        return 404;
    }
    
    # Deny access to sensitive files
    location ~* /(?:\.env|\.git|composer\.(json|lock)|package\.(json|lock)|phpunit\.xml|\.idea|\.vscode|\.editorconfig)$ {
        deny all;
        return 404;
    }
    
    # Deny access to storage directory (except storage/app/public)
    location ~* ^/storage/(?!app/public).*$ {
        deny all;
        return 404;
    }
    
    # Deny access to vendor directory
    location ~* ^/vendor/ {
        deny all;
        return 404;
    }
    
    # Deny access to bootstrap/cache
    location ~* ^/bootstrap/cache/ {
        deny all;
        return 404;
    }
    
    # Deny access to database directory
    location ~* ^/database/ {
        deny all;
        return 404;
    }

    # =============================================================================
    # MAINTENANCE MODE
    # =============================================================================
    
    # Custom maintenance page
    error_page 503 /maintenance.html;
    location = /maintenance.html {
        root /var/www/xenonos-api/public;
        internal;
    }
}

# =============================================================================
# ADDITIONAL SERVER BLOCKS (Optional)
# =============================================================================

# WWW redirect (if using www subdomain)
server {
    listen 80;
    listen [::]:80;
    server_name www.api.yourdomain.com;
    return 301 https://api.yourdomain.com$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.api.yourdomain.com;
    
    ssl_certificate /etc/letsencrypt/live/api.yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.yourdomain.com/privkey.pem;
    
    return 301 https://api.yourdomain.com$request_uri;
}
